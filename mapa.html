<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plano Interactivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">

</head>
<header class="page-header">
        <img src="cabecera.png" alt="">
</header>
<body>
   <div class="map-container">
        <img src="cole2.png" alt="Mapa" class="map-image">  
        <div class="hotspot" id="btn-5A" style="top: 23%; left: 33%;" data-name="Yokohama del Espacio"></div>
        <div class="hotspot" id="btn-1er" style="top: 23%; left: 49%;" data-name="Lusail de Ciudad Robot"></div>
        <div class="hotspot" id="btn-2do" style="top: 23%; left: 62%;" data-name="Wembley de las Olimpiadas"></div>
        <div class="hotspot" id="btn-4A" style="top: 50%; left: 33%;" data-name="Monumental de los Dinosaurios"></div>
        <div class="hotspot" id="btn-4B" style="top: 36%; left: 34%;" data-name="Azteca de los Superhéroes"></div>
        <div class="hotspot" id="btn-3A" style="top: 62%; left: 31%;" data-name="Maracaná del Fondo del Mar"></div>
        <div class="hotspot" id="btn-3B" style="top: 71%; left: 37%;" data-name="Soccer City de la Selva"></div>
        <div class="hotspot2" id="btn-copa" style="top: 55%; left: 64%;" data-name="Copa">
            <img src="copadelmundo3.png" class="icono-extra" id="copa">
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3 id="modal-title" ></h3>
            <hr style="margin-bottom: 10px;"> 
            <div class="stars">
                <input type="radio" id="s5" name="rate" value="5"><label for="s5"><i class="fas fa-star"></i></label>
                <input type="radio" id="s4" name="rate" value="4"><label for="s4"><i class="fas fa-star"></i></label>
                <input type="radio" id="s3" name="rate" value="3"><label for="s3"><i class="fas fa-star"></i></label>
                <input type="radio" id="s2" name="rate" value="2"><label for="s2"><i class="fas fa-star"></i></label>
                <input type="radio" id="s1" name="rate" value="1"><label for="s1"><i class="fas fa-star"></i></label>
            </div>
            <button id="btn-enviar">ENVIAR</button>
            <button id="btn-cancelar" style="background: #95a5a6; margin-top: 10px;">CANCELAR</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal2">
        <div class="modal-content">
            <h3 id="modal-title" >¡Completaste el desafio! Ya podes ir a sacarte una foto con la copa</h3>
            <img src="messi.jpg" alt="">
            <hr style="margin-bottom: 10px;"> 
            <button id="btn-voy">¡Voy!</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
