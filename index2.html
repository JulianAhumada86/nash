<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano Interactivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #1a1a1a; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; overflow: hidden; }

        .map-container { position: relative; display: inline-block; }
        .map-image { display: block; max-width: 95vw; max-height: 95vh; border-radius: 12px; }

        /* Estilo de las ondas */
        .hotspot {
            position: absolute; width: 35px; height: 35px;
            background-color: transparent; cursor: pointer;
            transform: translate(-50%, -50%); z-index: 5;
        }
        .hotspot::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(0.3); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        /* Estilo del Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 15px;
            width: 300px; text-align: center;
        }
        input[type="text"] { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; }

        /* Estrellas */
        .stars { display: flex; flex-direction: row-reverse; justify-content: center; gap: 5px; margin-bottom: 20px; }
        .stars input { display: none; }
        .stars label { font-size: 25px; color: #ccc; cursor: pointer; }
        .stars input:checked ~ label, .stars label:hover, .stars label:hover ~ label { color: gold; }

        button { width: 100%; padding: 10px; background: #2ecc71; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="map-container">
        <img src="cole2.png" alt="Mapa" class="map-image">
        
        <div class="hotspot" id="btn-estadio" style="top: 38%; left: 35%;"></div>

        <div class="hotspot" style="top: 22%; left: 32%;"></div>
        <div class="hotspot" style="top: 22%; left: 48%;"></div>
        <div class="hotspot" style="top: 22%; left: 63%;"></div>
        <div class="hotspot" style="top: 54%; left: 34%;"></div>
        <div class="hotspot" style="top: 65%; left: 29%;"></div>
        <div class="hotspot" style="top: 73%; left: 39%;"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3>¿Cómo se llama la sala?</h3>
            <input type="text" placeholder="Escribe el nombre...">
            <div class="stars">
                <input type="radio" id="s5" name="rate"><label for="s5"><i class="fas fa-star"></i></label>
                <input type="radio" id="s4" name="rate"><label for="s4"><i class="fas fa-star"></i></label>
                <input type="radio" id="s3" name="rate"><label for="s3"><i class="fas fa-star"></i></label>
                <input type="radio" id="s2" name="rate"><label for="s2"><i class="fas fa-star"></i></label>
                <input type="radio" id="s1" name="rate"><label for="s1"><i class="fas fa-star"></i></label>
            </div>
            <button id="btn-enviar">ENVIAR</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');
        const btnEstadio = document.getElementById('btn-estadio');
        const btnEnviar = document.getElementById('btn-enviar');

        // Abrir
        btnEstadio.addEventListener('click', () => modal.style.display = 'flex');

        // Cerrar
        btnEnviar.addEventListener('click', () => {
            modal.style.display = 'none';
            alert("¡Enviado con éxito!");
        });
    </script>
</body>
</html>
