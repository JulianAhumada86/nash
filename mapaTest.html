<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feria NASH</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">

</head>
<header class="page-header" style="background-color: white;">
        <img src="cartel ingreso.png" alt="" id="cabecera">
</header>
<body>
   <div class="map-container">
        <img src="colegio.png" alt="Mapa" class="map-image">  
        <div id="fuegos-contenedor"></div> 
        <div class="hotspot" id="btn-5A" style="top: 23%; left: 33%;" data-name="Yokohama del Espacio"></div>
        <div class="hotspot" id="btn-1er" style="top: 23%; left: 49%;" data-name="Lusail de Ciudad Robot"></div>
        <div class="hotspot" id="btn-2do" style="top: 23%; left: 62%;" data-name="Wembley de las Olimpiadas"></div>
        <div class="hotspot" id="btn-4A" style="top: 50%; left: 33%;" data-name="Monumental de los Dinosaurios"></div>
        <div class="hotspot" id="btn-4B" style="top: 36%; left: 34%;" data-name="Azteca de los Superhéroes"></div>
        <div class="hotspot" id="btn-3B" style="top: 62%; left: 31%;" data-name="Soccer City de la Selva"></div>
        <div class="hotspot" id="btn-3A" style="top: 71%; left: 37%;" data-name="Maracaná del Fondo del Ma"></div>
        <div class="hotspot2" id="btn-copa" style="top: 55%; left: 64%;" data-name="Copa">
            <img src="copa.png" class="icono-extra" id="copa">
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3 id="modal-title" ></h3>
            <hr style="margin-bottom: 10px;"> 
            <div class="stars">
                <input type="radio" id="s5" name="rate" value="5"><label for="s5"><i class="fas fa-star"></i></label>
                <input type="radio" id="s4" name="rate" value="4"><label for="s4"><i class="fas fa-star"></i></label>
                <input type="radio" id="s3" name="rate" value="3"><label for="s3"><i class="fas fa-star"></i></label>
                <input type="radio" id="s2" name="rate" value="2"><label for="s2"><i class="fas fa-star"></i></label>
                <input type="radio" id="s1" name="rate" value="1"><label for="s1"><i class="fas fa-star"></i></label>
            </div>
            <button id="btn-enviar">ENVIAR</button>
            <button id="btn-cancelar" style="background: #95a5a6; margin-top: 10px;">CANCELAR</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-info">
        <div class="modal-content">
            <h3 id="info-title"></h3>
            <p id="info-message" style="margin: 10px 0;"></p>
            <hr style="margin-bottom: 10px;"> 
            <img id="info-img" src="" alt="Estadio" style="width: 100%; border-radius: 10px;">
            <hr style="margin-bottom: 10px; margin-top: 10px;"> 
            <p>Tu puntuación: <span id="info-stars"></span></p>
            <button id="btn-listo" style="margin-top: 15px;">¡LISTO!</button>
        </div>
    </div>
    <div class="modal-overlay" id="modal2">
        <div class="modal-content">
            <h3 id="modal-title" >Ya casi completas el álbum...</h3>
            <p id="info-message" style="margin: 10px 0;">Dirigite al patio a buscar tu última figurita, completá el álbum y...<br>
                ¡Sacate la foto de campeón con el Trofeo de la Copa Mundial de la FIFA !</p>
            <img src="salas/Profes.png" alt=""style="width: 100%; border-radius: 10px;">
            <hr style="margin-bottom: 10px;"> 
            <button id="btn-voy">¡Voy!</button>
        </div>
    </div>
    <div class="alerta-aviso">
        <p>Recordá no cerrar esta  <br> página durante el recorrido</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
