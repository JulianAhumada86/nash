<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano Interactivo - Hotspots</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .map-container {
            position: relative;
            display: inline-block;
            max-width: 95vw;
            max-height: 95vh;
        }

        .map-image {
            display: block;
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
            border-radius: 12px;
        }

        /* ESTILO DE LAS ONDAS (Hotspot sin fondo) */
        .hotspot {
            position: absolute;
            width: 30px;
            height: 30px;
            /* Quitamos el fondo y el borde sólido */
            background-color: transparent;
            border: none;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        /* Efecto de onda (El círculo animado) */
        .hotspot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            bottom: 150%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 10;
        }

        .hotspot:hover .tooltip { opacity: 1; }
    </style>
</head>
<body>

    <div class="map-container">
        <img src="cole2.png" alt="Plano Interactivo" class="map-image">

        <div class="hotspot" style="top: 38%; left: 35%;">
            <div class="tooltip">
                <strong>Estadio</strong><br>
                Kempeess-SuperHeroe
            </div>
        </div>

        <div class="hotspot" style="top: 22%; left: 32%;">
            <div class="tooltip">
                <strong>Zona 5A</strong><br>
                Información del sector 5A
            </div>
        </div>

        <div class="hotspot" style="top: 22%; left: 48%;">
            <div class="tooltip">
                <strong>1er Piso / Sector</strong><br>
                Detalles del primer sector
            </div>
        </div>

        <div class="hotspot" style="top: 22%; left: 63%;">
            <div class="tooltip">
                <strong>2do Piso / Sector</strong><br>
                Detalles del segundo sector
            </div>
        </div>

        <div class="hotspot" style="top: 54%; left: 34%;">
            <div class="tooltip">
                <strong>Zona 4A</strong><br>
                Información del sector 4A
            </div>
        </div>

        <div class="hotspot" style="top: 65%; left: 29%;">
            <div class="tooltip">
                <strong>Zona 3B</strong><br>
                Información del sector 3B
            </div>
        </div>

        <div class="hotspot" style="top: 73%; left: 39%;">
            <div class="tooltip">
                <strong>Zona 3A</strong><br>
                Información del sector 3A
            </div>
        </div>

    </div>

    <script>
        // CAPTURA DE CLICKS (JavaScript por si necesitas disparar eventos o modales en el futuro)
        document.querySelectorAll('.hotspot').forEach((hotspot) => {
            hotspot.addEventListener('click', (e) => {
                e.stopPropagation();
                // Extrae el texto del título dentro del tooltip para el ejemplo
                const sectorName = hotspot.querySelector('strong').innerText;
                console.log(`Se hizo click en: ${sectorName}`);
                
                // Aquí podrías abrir un modal, reproducir un sonido, redirigir, etc.
            });
        });
    </script>
</body>
</html>
