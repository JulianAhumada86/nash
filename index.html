<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano Interactivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="map-container">
        <img src="cole2.png" alt="Mapa" class="map-image">
        
        
        <div class="hotspot" id="btn-5A" style="top: 22%; left: 32%;" data-name="Yokohama del Espacio"></div>
        <div class="hotspot" id="btn-1er" style="top: 22%; left: 48%;" data-name="Lusail de Ciudad Robot"></div>
        <div class="hotspot" id="btn-2do" style="top: 22%; left: 63%;" data-name="Wembley de las Olimpiadas"></div>
        <div class="hotspot" id="btn-4A" style="top: 50%; left: 33%;" data-name="Monumental de los Dinosaurios"></div>
        <div class="hotspot" id="btn-4B" style="top: 35%; left: 33%;" data-name="Azteca de los Superhéroes"></div>
        <div class="hotspot" id="btn-3A" style="top: 63%; left: 30%;" data-name="Maracaná del Fondo del Mar"></div>
        <div class="hotspot" id="btn-3B" style="top: 73%; left: 36%;" data-name="Soccer City de la Selva"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3 id="modal-title" ">¿Cómo se llama la sala?</h3>
            <hr style="margin-bottom: 10px;"> 
            <div class="stars">
                <input type="radio" id="s5" name="rate" value="5"><label for="s5"><i class="fas fa-star"></i></label>
                <input type="radio" id="s4" name="rate" value="4"><label for="s4"><i class="fas fa-star"></i></label>
                <input type="radio" id="s3" name="rate" value="3"><label for="s3"><i class="fas fa-star"></i></label>
                <input type="radio" id="s2" name="rate" value="2"><label for="s2"><i class="fas fa-star"></i></label>
                <input type="radio" id="s1" name="rate" value="1"><label for="s1"><i class="fas fa-star"></i></label>
            </div>
            <button id="btn-enviar">ENVIAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
