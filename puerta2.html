<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Feria de Ciencias</title>
    <link rel="stylesheet" href="puerta2.css">
</head>
<body>

<header>
        <img src="logo2.jpeg" alt="Nash World Cup" class="banner">
</header>

<main class="container">
    <div class="box">
        <h1>FERIA DE CIENCIAS</h1>
        <p>¡Registra tu familia y a los niños que vas a apoyar!</p>
        
        <input type="text" id="familia" placeholder="Apellido de la Familia">
        
        <div id="contenedor-niños"></div>
        
        <button class="btn-add" onclick="agregarFila()" id="btn-mas">+ Agregar niño (hasta 7)</button>
        <button class="btn-send" onclick="registrar()">Enviar Registro</button>
        <p id="mensaje"></p>
    </div>

</main>

<footer>
    <p>© 2026 Instituto J.F. NASH. Todos los derechos reservados.</p>
</footer>

<script src="puerta.js"></script>
</body>
</html>
