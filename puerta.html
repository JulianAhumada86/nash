<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Familias</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 2rem auto; padding: 0 1rem; }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Registrar Familia</h2>
        <input type="text" id="nombreInput" placeholder="Nombre y Apellido">
        <button onclick="registrar()">Registrarse</button>
        <p id="registroRespuesta"></p>
    </div>

    <div class="box">
        <h2>Consultar ID</h2>
        <input type="number" id="idInput" placeholder="Número de ID">
        <button onclick="consultar()">Buscar</button>
        <p id="consultaRespuesta"></p>
    </div>

    <script>
        const URL_API = 'https://script.google.com/macros/s/AKfycbwhMeVlciOmaE9OeGthDjdUdYzi6rygNax77WdyL2WMNDYd7IZ1RKSMgQh7bd7PGvY/exec'; // <--- NO OLVIDES PEGAR TU URL AQUÍ

        async function registrar() {
            const nombre = document.getElementById('nombreInput').value;
            const res = await fetch(URL_API, {
                method: 'POST',
                body: JSON.stringify({ nombre: nombre })
            });
            const data = await res.json();
            document.getElementById('registroRespuesta').innerText = 
                "¡Éxito! Tu ID es: " + data.id;
        }

        async function consultar() {
            const id = document.getElementById('idInput').value;
            const res = await fetch(`${URL_API}?id=${id}`);
            const data = await res.json();
            
            document.getElementById('consultaRespuesta').innerText = data.nombre 
                ? "Familia: " + data.nombre 
                : "ID no encontrado.";
        }
    </script>
</body>
</html>
