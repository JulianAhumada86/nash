<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feria NASH</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f9; margin: 0; padding-bottom: 20px; }
        .page-header { width: 100%; display: flex; justify-content: center; padding: 10px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .page-header img { max-width: 90%; height: auto; }
        
        .container { width: 90%; max-width: 400px; margin-top: 20px; }
        
        .card {
            background: white; border-radius: 15px; padding: 18px; margin: 12px 0;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-left: 8px solid #ddd;
            transition: transform 0.2s;
        }

        /* Colores del Podio Metálicos */
        .oro { border-left-color: #ffd700; background: linear-gradient(90deg, #fffdf0, #fff7cc); }
        .plata { border-left-color: #c0c0c0; background: linear-gradient(90deg, #fcfcfc, #ececec); }
        .bronce { border-left-color: #cd7f32; background: linear-gradient(90deg, #fffaf5, #f5e0cc); }

        .aula { font-weight: bold; font-size: 1.1em; color: #333; }
        .valor { font-weight: 800; color: #444; background: rgba(0,0,0,0.05); padding: 4px 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="page-header" style="background-color: white;">
        <img src="cartel ingreso.png" alt="Feria NASH">
    </header>

    <div class="container" id="app"></div>

    <script>
        async function cargarDatos() {
            try {
                const response = await fetch('https://script.google.com/macros/s/AKfycbxRnwNOmZowWLEvkoCaHN-xyZBKlPrOnB9OZO4q1v6rcrE2q0FUFYsTyFOzKUPq0mtW/exec');
                const data = await response.json();
                const container = document.getElementById('app');
                container.innerHTML = ''; 

                data.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    
                    if (index === 0) div.classList.add('oro');
                    else if (index === 1) div.classList.add('plata');
                    else if (index === 2) div.classList.add('bronce');

                    div.innerHTML = `
                        <span class="aula">${index < 3 ? '🏆 ' : ''}${item.aula}</span>
                        <span class="valor">${item.valor}</span>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                console.error("Error al obtener datos:", error);
                document.getElementById('app').innerHTML = '<p style="text-align:center;">Error al cargar el ranking.</p>';
            }
        }

        cargarDatos();
    </script>
</body>
</html>
